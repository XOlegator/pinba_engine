name: Docs

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

# Serialize GitHub Pages deployments. Two pushes to master in quick succession
# (e.g. a fix merge followed immediately by its release PR) otherwise trigger
# overlapping deployments to the same `github-pages` environment, which the
# Pages backend rejects with "Deployment failed, try again later". Queue runs
# instead of cancelling so an in-flight deployment always finishes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build API docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install Doxygen
        run: sudo apt-get install -y --no-install-recommends doxygen graphviz

      - name: Extract version from CMakeLists.txt
        id: version
        run: |
          ver=$(grep -m1 '^\s*VERSION [0-9]' CMakeLists.txt | grep -oP '[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Generate docs
        run: |
          sed "s/@PROJECT_VERSION@/${{ steps.version.outputs.version }}/g" Doxyfile \
            | doxygen -

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/api/html/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
