name: Docs

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  doxygen:
    name: Build & deploy API docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Doxygen
        run: sudo apt-get install -y --no-install-recommends doxygen graphviz

      - name: Extract version from CMakeLists.txt
        id: version
        run: |
          ver=$(grep -m1 '^\s*VERSION [0-9]' CMakeLists.txt | grep -oP '[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Generate docs
        run: |
          sed "s/@PROJECT_VERSION@/${{ steps.version.outputs.version }}/g" Doxyfile \
            | doxygen -

      - name: Setup Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/api/html/

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        id: deployment
        uses: actions/deploy-pages@v4
