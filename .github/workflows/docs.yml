name: Docs

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  doxygen:
    name: Build API docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Doxygen
        run: sudo apt-get install -y --no-install-recommends doxygen graphviz

      - name: Extract version from CMakeLists.txt
        id: version
        run: |
          ver=$(grep -m1 '^\s*VERSION [0-9]' CMakeLists.txt | grep -oP '[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Generate docs
        run: |
          sed "s/@PROJECT_VERSION@/${{ steps.version.outputs.version }}/g" Doxyfile \
            | doxygen -

      - name: Upload docs artifact
        uses: actions/upload-artifact@v5
        with:
          name: api-docs
          path: docs/api/html/
          retention-days: 30
