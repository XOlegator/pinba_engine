name: Docker

on:
  release:
    types: [published]
  push:
    branches: [master]
    paths:
      - 'Dockerfile.mysql80'
      - 'Dockerfile.mysql84'
      - 'Dockerfile.mariadb1011'
      - 'Dockerfile.mariadb118'
  workflow_dispatch:
    inputs:
      release-tag:
        description: 'Release tag to publish, e.g. v1.2.3. Leave empty to use the current ref.'
        required: false
        type: string

jobs:
  build-push:
    name: Build and push (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: Dockerfile.mysql80
            label: "MySQL 8.0"
            tag: "8.0"
          - dockerfile: Dockerfile.mysql84
            label: "MySQL 8.4"
            tag: "8.4"
          - dockerfile: Dockerfile.mariadb1011
            label: "MariaDB 10.11"
            tag: "mariadb-10.11"
          - dockerfile: Dockerfile.mariadb118
            label: "MariaDB 11.8"
            tag: "mariadb-11.8"
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'release' && (inputs.release-tag || github.ref) || github.sha }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve pinba version
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ inputs.release-tag != '' && inputs.release-tag || github.ref_name }}"
            VERSION="${TAG#v}"
          else
            # push (MySQL update) or workflow_dispatch without tag: read from manifest
            VERSION="$(jq -r '."."' .release-please-manifest.json)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building Docker image: pinba-engine $VERSION (${{ matrix.label }})"

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            xolegator/pinba-engine:${{ matrix.tag }}-v${{ steps.meta.outputs.version }}
            xolegator/pinba-engine:${{ matrix.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
