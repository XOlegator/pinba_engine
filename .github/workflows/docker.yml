name: Docker

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release-tag:
        description: 'Release tag to publish, e.g. v1.2.3. Leave empty to use the current ref.'
        required: false
        type: string

jobs:
  build-push:
    name: Build and push (${{ matrix.series }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - dockerfile: Dockerfile.mysql80
            series: "8.0"
          - dockerfile: Dockerfile.mysql84
            series: "8.4"
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release-tag != '' && inputs.release-tag || github.ref }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        run: |
          TAG="${{ inputs.release-tag != '' && inputs.release-tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            xolegator/pinba-engine:${{ matrix.series }}-v${{ steps.meta.outputs.version }}
            xolegator/pinba-engine:${{ matrix.series }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
