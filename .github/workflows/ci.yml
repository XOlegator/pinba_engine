name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install clang-format
        run: sudo apt-get install -y --no-install-recommends clang-format

      - name: Check formatting
        run: |
          find src tests -type f \( -name "*.cc" -o -name "*.h" -o -name "*.c" \) \
            ! -name "xxhash.c" ! -name "xxhash.h" \
            ! -name "protobuf-c.h" ! -name "protobuf-c-private.h" \
            ! -name "pinba.pb-c.cc" ! -name "pinba.pb-c.h" \
            | xargs clang-format --dry-run --Werror

  build-test:
    name: Build & test (MySQL ${{ matrix.mysql-series }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - mysql-series: "8.0"
            cmake-preset: release-download-mysql-source
            mysql-version: "8.0.46"
          - mysql-series: "8.4"
            cmake-preset: release-download-mysql84-source
            mysql-version: "8.4.9"

    steps:
      - uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake \
            libprotobuf-dev protobuf-compiler \
            rapidjson-dev \
            libssl-dev pkg-config \
            cppcheck clang-tidy

      - name: Cache MySQL source tarball and GoogleTest
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: deps-mysql${{ matrix.mysql-version }}-gtest1.15.2

      - name: Configure
        run: cmake --preset ${{ matrix.cmake-preset }}

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure -j$(nproc)

      - name: cppcheck (C++23 static analysis)
        if: matrix.mysql-series == '8.4'
        run: |
          cppcheck \
            --project=build/compile_commands.json \
            --std=c++23 \
            --enable=warning,performance,portability \
            --error-exitcode=1 \
            --quiet \
            --suppress=preprocessorErrorDirective \
            --suppress=missingInclude \
            "--suppress=*:build/*" \
            --file-filter='*/src/*.cc'

      - name: clang-tidy
        run: |
          jq -r '.[].file' build/compile_commands.json \
            | grep -E "^${GITHUB_WORKSPACE}/src/.*\.cc$" \
            | grep -vE "/(xxhash|protobuf-c|pinba\.pb-c)\." \
            | sort -u \
            | xargs clang-tidy --quiet -p build

  sanitize:
    name: Sanitize / MySQL ${{ matrix.mysql-series }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - mysql-series: "8.0"
            cmake-preset: debug-download-mysql-source
            mysql-version: "8.0.46"
          - mysql-series: "8.4"
            cmake-preset: debug-download-mysql84-source
            mysql-version: "8.4.9"

    steps:
      - uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake \
            libprotobuf-dev protobuf-compiler \
            rapidjson-dev \
            libssl-dev pkg-config

      - name: Cache MySQL source tarball and GoogleTest
        uses: actions/cache@v5
        with:
          path: build-debug/_deps
          key: deps-debug-mysql${{ matrix.mysql-version }}-gtest1.15.2

      - name: Configure
        run: cmake --preset ${{ matrix.cmake-preset }}

      - name: Build
        run: cmake --build build-debug --parallel $(nproc)

      - name: Test (ASan/UBSan)
        run: ctest --test-dir build-debug --output-on-failure -j$(nproc)

  coverage:
    name: Coverage / MySQL ${{ matrix.mysql-series }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - mysql-series: "8.0"
            cmake-preset: coverage-download-mysql-source
            mysql-version: "8.0.46"
            build-dir: build-coverage
            artifact-name: coverage-mysql80
          - mysql-series: "8.4"
            cmake-preset: coverage-download-mysql84-source
            mysql-version: "8.4.9"
            build-dir: build-coverage84
            artifact-name: coverage-mysql84

    steps:
      - uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake \
            libprotobuf-dev protobuf-compiler \
            rapidjson-dev \
            libssl-dev pkg-config \
            lcov

      - name: Cache MySQL source tarball and GoogleTest
        uses: actions/cache@v5
        with:
          path: ${{ matrix.build-dir }}/_deps
          key: deps-coverage-mysql${{ matrix.mysql-version }}-gtest1.15.2

      - name: Configure
        run: cmake --preset ${{ matrix.cmake-preset }}

      - name: Build
        run: cmake --build ${{ matrix.build-dir }} --parallel $(nproc)

      - name: Test
        run: ctest --test-dir ${{ matrix.build-dir }} --output-on-failure -j$(nproc)

      - name: Collect coverage
        run: |
          lcov \
            --capture \
            --directory ${{ matrix.build-dir }} \
            --output-file ${{ matrix.artifact-name }}.info \
            --ignore-errors source,mismatch
          lcov \
            --remove ${{ matrix.artifact-name }}.info \
              '/usr/*' \
              '*/build*/_deps/*' \
              '*/tests/*' \
            --output-file ${{ matrix.artifact-name }}.info \
            --ignore-errors unused
          lcov --summary ${{ matrix.artifact-name }}.info

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-name }}.info
          retention-days: 30
