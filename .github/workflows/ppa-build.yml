name: PPA Build and Publish

on:
  release:
    types:
      - published
  push:
    branches: [master]
    paths:
      - '.github/mysql-versions.json'
  workflow_dispatch:
    inputs:
      source_ref:
        description: Git ref to package, e.g. v2.3.0 or a commit SHA; required for manual uploads
        required: false
        type: string
      upstream_version:
        description: Upstream version override, e.g. 2.3.0
        required: false
        type: string
      debian_revision:
        description: Override debian_revision (default — read from mysql-versions.json)
        required: false
        type: string
      target_distribution:
        description: Limit workflow_dispatch to one distro or build both
        required: false
        default: all
        type: choice
        options:
          - all
          - noble
          - resolute
      upload:
        description: Upload the signed source package to Launchpad
        required: false
        default: true
        type: boolean

permissions:
  contents: read

env:
  DEBEMAIL: o.ekhlakov@protonmail.com
  DEBFULLNAME: Oleg Ekhlakov
  PPA_OWNER: xolegator
  PPA_NAME: packages
  PPA_DPUT_NAME: xolegator-packages

jobs:
  prepare-matrix:
    name: Prepare build matrix
    runs-on: ubuntu-24.04
    outputs:
      include: ${{ steps.matrix.outputs.include }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.source_ref || github.sha }}

      - name: Resolve target matrix
        id: matrix
        run: |
          MYSQL80=$(jq -r '.noble.mysql80 // "8.0.46"'   .github/mysql-versions.json)
          MYSQL84=$(jq -r '.resolute.mysql84 // "8.4.9"' .github/mysql-versions.json)
          NOBLE_REV=$(jq -r '.noble.debian_revision    // 1' .github/mysql-versions.json)
          RESOLUTE_REV=$(jq -r '.resolute.debian_revision // 1' .github/mysql-versions.json)

          echo "MySQL versions from JSON: 8.0=$MYSQL80  8.4=$MYSQL84"
          echo "Debian revisions:  noble=$NOBLE_REV  resolute=$RESOLUTE_REV"

          case "${{ github.event_name }}:${{ inputs.target_distribution || 'all' }}" in
            workflow_dispatch:noble)
              include=$(jq -cn \
                --arg m80 "$MYSQL80" --arg m84 "$MYSQL84" --argjson rev "$NOBLE_REV" \
                '[{"distribution":"noble","ubuntu_version":"24.04","enable_mysql80":"1","enable_mysql84":"0",
                   "mysql80_version":$m80,"mysql84_version":$m84,"include_orig":"1","debian_revision":$rev}]')
              ;;
            workflow_dispatch:resolute)
              include=$(jq -cn \
                --arg m80 "$MYSQL80" --arg m84 "$MYSQL84" --argjson rev "$RESOLUTE_REV" \
                '[{"distribution":"resolute","ubuntu_version":"26.04","enable_mysql80":"0","enable_mysql84":"1",
                   "mysql80_version":$m80,"mysql84_version":$m84,"include_orig":"1","debian_revision":$rev}]')
              ;;
            *)
              include=$(jq -cn \
                --arg m80 "$MYSQL80" --arg m84 "$MYSQL84" \
                --argjson nrev "$NOBLE_REV" --argjson rrev "$RESOLUTE_REV" \
                '[{"distribution":"noble","ubuntu_version":"24.04","enable_mysql80":"1","enable_mysql84":"0",
                   "mysql80_version":$m80,"mysql84_version":$m84,"include_orig":"1","debian_revision":$nrev},
                  {"distribution":"resolute","ubuntu_version":"26.04","enable_mysql80":"0","enable_mysql84":"1",
                   "mysql80_version":$m80,"mysql84_version":$m84,"include_orig":"0","debian_revision":$rrev}]')
              ;;
          esac

          echo "include=$include" >> "$GITHUB_OUTPUT"

  build-source-package:
    name: Build source package (${{ matrix.distribution }})
    needs: prepare-matrix
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare-matrix.outputs.include) }}
    steps:
      - name: Validate manual upload inputs
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.upload }}" == "true" ]]; then
            if [[ -z "${{ github.event.inputs.source_ref || '' }}" ]]; then
              echo "workflow_dispatch uploads must provide source_ref (for example v2.3.0)." >&2
              exit 1
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.source_ref || github.sha }}

      - name: Install packaging tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            debhelper \
            devscripts \
            fakeroot \
            jq \
            lintian \
            libprotobuf-dev \
            protobuf-compiler \
            libmysqlclient-dev \
            libssl-dev \
            pkg-config \
            rapidjson-dev

      - name: Resolve package version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.upstream_version || '' }}" ]]; then
            upstream_version="${{ github.event.inputs.upstream_version }}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            upstream_version="${{ github.event.release.tag_name }}"
            upstream_version="${upstream_version#v}"
          else
            upstream_version="$(jq -r '."."' .release-please-manifest.json)"
          fi

          # Debian revision: manual override → matrix value from JSON → fallback 1
          if [[ -n "${{ github.event.inputs.debian_revision || '' }}" ]]; then
            deb_rev="${{ github.event.inputs.debian_revision }}"
          else
            deb_rev="${{ matrix.debian_revision }}"
          fi

          full_version="${upstream_version}-${deb_rev}~${{ matrix.distribution }}1"

          echo "upstream_version=$upstream_version" >> "$GITHUB_OUTPUT"
          echo "full_version=$full_version" >> "$GITHUB_OUTPUT"
          echo "Building: $full_version"

      - name: Generate distro build configuration
        run: |
          cat > debian/pinba-ppa-build.mk <<EOF
          ENABLE_MYSQL80=${{ matrix.enable_mysql80 }}
          ENABLE_MYSQL84=${{ matrix.enable_mysql84 }}
          MYSQL80_VERSION=${{ matrix.mysql80_version }}
          MYSQL84_VERSION=${{ matrix.mysql84_version }}
          EOF

      - name: Rewrite debian/changelog for target distro
        run: |
          dch --force-distribution \
            --distribution "${{ matrix.distribution }}" \
            --newversion "${{ steps.version.outputs.full_version }}" \
            "Automated PPA build from GitHub Actions for Ubuntu ${{ matrix.ubuntu_version }}."

      - name: Create orig tarball
        run: |
          git archive \
            --prefix="pinba-engine-${{ steps.version.outputs.upstream_version }}/" \
            HEAD \
            | gzip -9 > "../pinba-engine_${{ steps.version.outputs.upstream_version }}.orig.tar.gz"

      - name: Build source package
        run: |
          if [[ "${{ matrix.include_orig }}" == "1" ]]; then
            dpkg-buildpackage -S -sa -us -uc
          else
            dpkg-buildpackage -S -sd -us -uc
          fi

      - name: Check source package with lintian
        run: |
          lintian --fail-on error ../pinba-engine_*_source.changes

      - name: Collect source package artifacts
        run: |
          mkdir -p "$RUNNER_TEMP/ppa-artifacts"
          cp ../pinba-engine_*.dsc "$RUNNER_TEMP/ppa-artifacts/"
          cp ../pinba-engine_*.orig.tar.gz "$RUNNER_TEMP/ppa-artifacts/"
          cp ../pinba-engine_*.buildinfo "$RUNNER_TEMP/ppa-artifacts/"
          cp ../pinba-engine_*_source.changes "$RUNNER_TEMP/ppa-artifacts/"
          cp ../pinba-engine_*.debian.tar.* "$RUNNER_TEMP/ppa-artifacts/"

      - name: Upload source package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ppa-source-package-${{ matrix.distribution }}
          path: ${{ runner.temp }}/ppa-artifacts/*
          if-no-files-found: error
          retention-days: 7

  upload-to-ppa:
    name: Sign and upload to Launchpad
    needs: build-source-package
    runs-on: ubuntu-24.04
    if: >-
      github.event_name == 'release' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.upload == true)
    steps:
      - name: Install upload tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            devscripts \
            dput \
            gnupg

      - name: Download source package artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ppa-source-package-*
          merge-multiple: true
          path: ${{ runner.temp }}/ppa-artifacts

      - name: Import Launchpad GPG key
        env:
          LAUNCHPAD_GPG_PRIVATE_KEY: ${{ secrets.LAUNCHPAD_GPG_PRIVATE_KEY }}
        run: |
          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          printf 'allow-loopback-pinentry\n' > "$GNUPGHOME/gpg-agent.conf"
          printf '%s' "$LAUNCHPAD_GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
          gpg --batch --list-secret-keys --keyid-format LONG

      - name: Sign source package
        env:
          LAUNCHPAD_GPG_FINGERPRINT: ${{ secrets.LAUNCHPAD_GPG_FINGERPRINT }}
          LAUNCHPAD_GPG_PASSPHRASE: ${{ secrets.LAUNCHPAD_GPG_PASSPHRASE }}
        run: |
          cat > "$RUNNER_TEMP/debsign-gpg-wrapper" <<'EOF'
          #!/bin/sh
          exec gpg --batch --yes \
            --pinentry-mode loopback \
            --passphrase "$LAUNCHPAD_GPG_PASSPHRASE" \
            "$@"
          EOF
          chmod +x "$RUNNER_TEMP/debsign-gpg-wrapper"
          debsign --no-re-sign -p"$RUNNER_TEMP/debsign-gpg-wrapper" \
            -k"$LAUNCHPAD_GPG_FINGERPRINT" \
            "$RUNNER_TEMP"/ppa-artifacts/*_source.changes

      - name: Configure dput
        run: |
          cat > ~/.dput.cf <<'EOF'
          [xolegator-packages]
          fqdn = ppa.launchpad.net
          method = ftp
          incoming = ~xolegator/packages/ubuntu/
          login = anonymous
          allow_unsigned_uploads = 0
          passive_ftp = 1
          EOF

      - name: Upload to Launchpad
        run: |
          for changes_file in "$RUNNER_TEMP"/ppa-artifacts/*_source.changes; do
            for attempt in 1 2 3; do
              if dput xolegator-packages "$changes_file"; then
                break
              fi
              if [[ $attempt -lt 3 ]]; then
                echo "Attempt $attempt failed, retrying in 30s..."
                sleep 30
              else
                echo "All $attempt attempts failed for $changes_file" >&2
                exit 1
              fi
            done
          done
